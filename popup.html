<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAd 素材需求提取助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #F5F5F7;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            display: flex;
            justify-content: center;
            padding: 12px;
        }

        .popup-container {
            width: 340px;
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            color: #1F1F1F;
            font-weight: 600;
        }

        .btn {
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.75;
        }

        .btn-primary {
            background: #1677FF;
            color: #FFFFFF;
            width: 100%;
            box-shadow: 0 2px 0 rgba(5, 145, 255, 0.1);
        }

        .btn-primary:hover {
            background: #4096FF;
        }

        .btn-secondary {
            background: #FFFFFF;
            color: #1F1F1F;
            border: 1px solid #D9D9D9;
            width: 100%;
        }

        .btn-secondary:hover {
            background: #FAFAFA;
            border-color: #1677FF;
            color: #1677FF;
        }

        .status-area {
            display: none;
            gap: 8px;
            flex-wrap: wrap;
            animation: fadeIn 0.3s ease-out;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background: #F6FFED;
            color: #389E0D;
            border: 1px solid #B7EB8F;
        }

        .badge-blue {
            background: #E6F4FF;
            color: #1677FF;
            border: 1px solid #91CAFF;
        }

        .badge-purple {
            background: #F9F0FF;
            color: #531DAB;
            border: 1px solid #D3ADF7;
        }

        .badge-red {
            background: #FFF1F0;
            color: #CF1322;
            border: 1px solid #FFA39E;
            width: 100%;
            text-align: center;
            padding: 8px;
            margin-top: 4px;
        }

        .badge-small-red {
            background: #FFF1F0;
            color: #CF1322;
            border: 1px solid #FFA39E;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .list-wrapper {
            background: #FAFAFA;
            border: 1px solid #F0F0F0;
            border-radius: 8px;
            padding: 4px;
            display: none;
        }

        .task-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .task-list::-webkit-scrollbar {
            width: 4px;
        }

        .task-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: #D9D9D9;
            border-radius: 4px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
        }

        .task-item:hover {
            background: #F0F0F0;
        }

        .task-name {
            font-size: 13px;
            color: #262626;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .task-meta {
            font-size: 12px;
            color: #8C8C8C;
            white-space: nowrap;
        }

        .export-actions {
            display: none;
            gap: 10px;
        }

        .btn-excel {
            flex: 1;
            background: #F6FFED;
            color: #389E0D;
            border: 1px solid #B7EB8F;
        }

        .btn-excel:hover {
            background: #D9F7BE;
            border-color: #95DE64;
        }

        .btn-json {
            flex: 1;
            background: #F9F0FF;
            color: #531DAB;
            border: 1px solid #D3ADF7;
        }

        .btn-json:hover {
            background: #EFDBFF;
            border-color: #B37FEB;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="popup-container">
        <div class="header"><span>🚀</span><span>任务抓取工具</span></div>
        <button id="extractBtn" class="btn btn-primary"><span>📥</span> 提取当前页面任务</button>
        <div id="statusArea" class="status-area"></div>
        <div id="listWrapper" class="list-wrapper">
            <ul id="taskList" class="task-list"></ul>
        </div>
        <div id="exportActions" class="export-actions">
            <button id="exportExcelBtn" class="btn btn-excel"><span>📊</span> 导出 Excel</button>
            <button id="exportJsonBtn" class="btn btn-json"><span>📋</span> 导出 JSON</button>
        </div>
    </div>

    <script src="xlsx.bundle.js"></script>
    <script src="popup.js"></script>
</body>
</html>
